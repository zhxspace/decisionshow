<?xml version="1.0" encoding="UTF-8"?>
<svg id="workflowFlowchartSvg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 815" role="img" aria-labelledby="title desc">
<title id="title">Decision 项目工作流流程图</title>
<desc id="desc">顶部为变更影响管理控制层，六个治理动作在每个项目阶段发生变化时重复执行；左侧分支说明该控制层在需求、产品设计、技术设计和开发验收阶段分别管控什么。</desc>
<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#94a3b8"/>
  </marker>
  <marker id="controlArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#111827"/>
  </marker>
  <marker id="govArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="#ffffff"/>
  </marker>
  <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
    <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#94a3b8" flood-opacity="0.12"/>
  </filter>
</defs>
<style>
  .canvas{fill:#ffffff}
  .governance{fill:#111827;filter:url(#shadow)}
  .governance-title{font:800 20px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#ffffff;text-anchor:middle;dominant-baseline:middle}
  .governance-subtitle{font:500 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#cbd5e1;text-anchor:middle;dominant-baseline:middle}
  .governance-note{font:600 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#e5e7eb;text-anchor:middle;dominant-baseline:middle}
  .gov-node{fill:#ffffff;stroke:#111827;stroke-width:1.5}
  .gov-node-text{font:700 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#111827;text-anchor:middle;dominant-baseline:middle}
  .gov-step{fill:none;stroke:#ffffff;stroke-width:1.6;marker-end:url(#govArrow)}
  .lane{fill:#f8fafc;stroke:#e5e7eb;stroke-width:1}
  .lane-title{font:700 17px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#475569}
  .control-axis{fill:none;stroke:#111827;stroke-width:2.6;stroke-linecap:round}
  .control-branch{fill:none;stroke:#111827;stroke-width:2;marker-end:url(#controlArrow)}
  .control-label{fill:#111827}
  .control-label-text{font:700 13px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#ffffff;text-anchor:middle;dominant-baseline:middle}
  .node,.gate{stroke:#cbd5e1;stroke-width:1.3;filter:url(#shadow)}
  .node{fill:#ffffff}
  .gate{fill:#f1f5f9}
  .node-text,.gate-text{font:500 14px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#334155;text-anchor:middle;dominant-baseline:middle}
  .gate-text{font-weight:650}
  .arrow{fill:none;stroke:#94a3b8;stroke-width:1.4;marker-end:url(#arrow)}
  .stage-flow-label{font:600 12px -apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;fill:#64748b;text-anchor:end}
</style>
<rect class="canvas" x="0" y="0" width="1200" height="815"/>

<rect class="governance" x="44" y="24" width="1112" height="168" rx="24"/>
<text class="governance-title" x="600" y="54">变更影响管理</text>
<text class="governance-subtitle" x="600" y="81">控制层：发现变化 → 判断影响 → 同步产物 → 验证一致性 → 沉淀证据</text>
<g id="gov0">
  <rect class="gov-node" x="92" y="104" width="132" height="44" rx="14"/>
  <text class="gov-node-text" x="158" y="123"><tspan x="158">扫描</tspan><tspan x="158" dy="16">变更</tspan></text>
</g>
<g id="gov1">
  <rect class="gov-node" x="263" y="104" width="132" height="44" rx="14"/>
  <text class="gov-node-text" x="329" y="123"><tspan x="329">状态</tspan><tspan x="329" dy="16">标记</tspan></text>
</g>
