  <rect class="gov-node" x="434" y="104" width="132" height="44" rx="14"/>
  <text class="gov-node-text" x="500" y="123"><tspan x="500">影响</tspan><tspan x="500" dy="16">分析</tspan></text>
</g>
<g id="gov3">
  <rect class="gov-node" x="605" y="104" width="132" height="44" rx="14"/>
  <text class="gov-node-text" x="671" y="123"><tspan x="671">同步上下游</tspan><tspan x="671" dy="16">产物</tspan></text>
</g>
<g id="gov4">
  <rect class="gov-node" x="776" y="104" width="132" height="44" rx="14"/>
  <text class="gov-node-text" x="842" y="123"><tspan x="842">验证 / 接受</tspan><tspan x="842" dy="16">变更</tspan></text>
</g>
<g id="gov5">
  <rect class="gov-node" x="947" y="104" width="132" height="44" rx="14"/>
  <text class="gov-node-text" x="1013" y="123"><tspan x="1013">记录证据</tspan><tspan x="1013" dy="16">与决策</tspan></text>
</g>
<path class="gov-step" d="M 224 126 L 263 126"/>
<path class="gov-step" d="M 395 126 L 434 126"/>
<path class="gov-step" d="M 566 126 L 605 126"/>
<path class="gov-step" d="M 737 126 L 776 126"/>
<path class="gov-step" d="M 908 126 L 947 126"/>
<text class="governance-note" x="600" y="170">上方 6 个节点不是单独产物；它们是在每个阶段遇到范围、设计、技术或验收变化时重复执行的治理动作</text>

<path class="control-axis" d="M 72 192 L 72 775"/>
<text class="stage-flow-label" x="1110" y="214">阶段门禁通过后进入下一阶段</text>

<rect class="lane" x="128" y="218" width="1036" height="118" rx="16"/>
<text class="lane-title" x="150" y="249">需求澄清</text>
<path class="control-branch" d="M 72 277 L 128 277"/>
<rect class="control-label" x="150" y="266" width="238" height="32" rx="16"/>
<text class="control-label-text" x="269" y="286">范围变化：回到需求确认</text>

<rect class="lane" x="128" y="365" width="1036" height="118" rx="16"/>
<text class="lane-title" x="150" y="396">产品设计</text>
<path class="control-branch" d="M 72 424 L 128 424"/>
<rect class="control-label" x="150" y="413" width="270" height="32" rx="16"/>
<text class="control-label-text" x="285" y="433">设计变化：同步流程 / PRD / 原型</text>

<rect class="lane" x="128" y="512" width="1036" height="118" rx="16"/>
<text class="lane-title" x="150" y="543">技术设计</text>
<path class="control-branch" d="M 72 571 L 128 571"/>
<rect class="control-label" x="150" y="560" width="276" height="32" rx="16"/>
<text class="control-label-text" x="288" y="580">技术变化：校准架构 / 接口 / 任务</text>

<rect class="lane" x="128" y="659" width="1036" height="118" rx="16"/>
<text class="lane-title" x="150" y="690">开发验收</text>
<path class="control-branch" d="M 72 718 L 128 718"/>
<rect class="control-label" x="150" y="707" width="270" height="32" rx="16"/>
<text class="control-label-text" x="285" y="727">验收变化：补测试 / 截图 / 记录</text>

<g id="row1">
  <rect class="node" x="438" y="255" width="90" height="44" rx="8"/>
  <text class="node-text" x="483" y="281">头脑风暴</text>
